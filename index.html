<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Behna Archive Virtual Lab</title>
<style>
  :root{
    --bg:#0c0e12; --panel:#13161d; --panel2:#191d26; --panel3:#1e2330;
    --border:#272d3a; --border2:#333a4a;
    --ink:#e8eaf0; --muted:#8b95a8; --dim:#5c6578;
    --accent:#d4a843; --accent2:#5b8def; --green:#4fae8b; --red:#e06565;
    --candidate:#6b9cf5; --advisor:#d4a843; --peer:#d97070; --system:#6f7787; --retrieval:#4fae8b;
    --radius:10px; --radius-sm:6px;
    --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    --font-serif:'Iowan Old Style','Palatino Linotype',Georgia,serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{font-family:var(--font-sans);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}

  /* ===== HEADER ===== */
  header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;
    border-bottom:1px solid var(--border);background:var(--panel);height:52px}
  header h1{font-size:16px;font-weight:600;letter-spacing:.3px}
  header h1 span{color:var(--accent);font-weight:700}
  .hstats{font-size:11px;color:var(--muted)}

  /* ===== LAYOUT ===== */
  .app{display:grid;grid-template-columns:340px 1fr 380px;height:calc(100vh - 52px)}
  .col{overflow-y:auto;padding:20px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
  .col::-webkit-scrollbar{width:6px}.col::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  .col-left{background:var(--panel);border-right:1px solid var(--border)}
  .col-right{background:var(--panel);border-left:1px solid var(--border)}

  /* ===== SECTION TITLES ===== */
  .stitle{font-size:10px;text-transform:uppercase;letter-spacing:1.8px;color:var(--dim);margin-bottom:12px;font-weight:600}

  /* ===== TABS ===== */
  .tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid var(--border)}
  .tab{padding:8px 14px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
  .tab:hover{color:var(--ink)}.tab.active{color:var(--accent);border-color:var(--accent)}

  /* ===== FORMS ===== */
  label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;margin-top:14px}
  label:first-child{margin-top:0}
  textarea,input[type="text"],input[type="number"],select{
    width:100%;background:var(--panel3);border:1px solid var(--border);color:var(--ink);
    border-radius:var(--radius-sm);padding:10px 12px;font-family:var(--font-sans);font-size:13px;
    line-height:1.55;resize:vertical;transition:.15s}
  textarea:focus,input:focus{outline:none;border-color:var(--accent2);box-shadow:0 0 0 2px rgba(91,141,239,.15)}
  textarea{min-height:100px}
  textarea.tall{min-height:160px}
  textarea.short{min-height:60px}
  .peer-lens{position:relative;margin-bottom:8px}
  .peer-lens textarea{min-height:50px;padding-right:36px}
  .peer-lens .rm{position:absolute;top:6px;right:6px;background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;opacity:.5}
  .peer-lens .rm:hover{opacity:1}
  .add-lens{font-size:12px;color:var(--accent2);cursor:pointer;display:inline-block;margin-top:4px}
  .add-lens:hover{text-decoration:underline}
  .form-row{display:flex;gap:12px}
  .form-row>*{flex:1}

  /* ===== BUTTONS ===== */
  button{cursor:pointer;border:none;border-radius:var(--radius-sm);padding:9px 14px;font-family:var(--font-sans);font-size:13px;font-weight:500;transition:.12s}
  .btn-launch{background:var(--accent);color:#1a1303;font-weight:700;width:100%;margin-top:18px;padding:12px;border-radius:var(--radius);font-size:14px}
  .btn-launch:hover{filter:brightness(1.1)}
  .btn-launch:disabled{opacity:.4;cursor:not-allowed}

  /* ===== RUN LIST ===== */
  .runlist{margin-top:20px}
  .runcard{background:var(--panel2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:.15s}
  .runcard:hover{border-color:var(--accent2);background:var(--panel3)}
  .runcard.active{border-color:var(--accent);box-shadow:inset 3px 0 0 var(--accent)}
  .runcard .topic{font-size:13px;line-height:1.4;margin-bottom:6px;color:var(--ink)}
  .badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
  .badge.running{background:#16361f;color:#5fd08a}.badge.completed{background:#1d2b46;color:#7fa6f0}
  .badge.paused{background:#3a3416;color:#e0c95f}.badge.created{background:#2a2f3a;color:var(--muted)}
  .badge.error,.badge.stopped{background:#3a1d1d;color:#e08585}

  /* ===== CENTER: TIMELINE ===== */
  .center-head{padding:16px 24px 0;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .phases{display:flex;gap:4px;flex-wrap:wrap}
  .pchip{font-size:10px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);color:var(--muted);font-weight:500}
  .pchip.done{background:#16361f;color:#5fd08a;border-color:#1f5230}
  .pchip.cur{background:var(--accent);color:#1a1303;border-color:var(--accent);font-weight:700}
  .live-dot{font-size:10px;color:#5fd08a;animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  .controls{display:flex;gap:8px;padding:12px 24px 0}
  .controls button{flex:1;font-size:12px;padding:7px 10px}
  .b-run{background:#1f5230;color:#bfe9cf}.b-run:hover{background:#256b3d}
  .b-pause{background:#5a5113;color:#f0e09a}.b-pause:hover{background:#6b6118}
  .b-stop{background:#5a2020;color:#f0b0b0}.b-stop:hover{background:#6b2828}

  #timeline{padding:16px 24px;overflow-y:auto;flex:1}
  .col-center{display:flex;flex-direction:column;overflow:hidden}

  .event{border-left:3px solid var(--system);background:var(--panel2);border-radius:0 var(--radius) var(--radius) 0;
    padding:14px 18px;margin-bottom:12px}
  .event.candidate{border-color:var(--candidate)}.event.advisor{border-color:var(--advisor)}
  .event.peer{border-color:var(--peer)}.event.system{border-color:var(--system)}
  .event[data-kind="retrieval"]{border-color:var(--retrieval)}
  .ehead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .who{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
  .who.candidate{color:var(--candidate)}.who.advisor{color:var(--advisor)}.who.peer{color:var(--peer)}.who.system{color:var(--muted)}
  .etime{font-size:10px;color:var(--dim)}
  .etitle{font-size:14px;font-weight:600;margin-bottom:8px;color:#f5f0e5}
  .ebody{font-size:13px;line-height:1.65;color:#c8cdd8;white-space:pre-wrap;
    max-height:300px;overflow-y:auto;padding:10px 12px;background:var(--panel3);border-radius:var(--radius-sm);
    scrollbar-width:thin;scrollbar-color:var(--border) transparent;font-family:var(--font-serif)}
  .ebody::-webkit-scrollbar{width:5px}.ebody::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  .gate{font-size:10px;font-weight:700;padding:3px 9px;border-radius:5px;margin-left:10px;text-transform:uppercase}
  .gate.ok{background:#16361f;color:#5fd08a}.gate.no{background:#3a1d1d;color:#e08585}
  .docids{margin-top:8px}
  .docids a{color:var(--retrieval);font-size:11px;margin-right:10px;text-decoration:none;border-bottom:1px dotted var(--retrieval);cursor:pointer}
  .docids a:hover{color:#7ff5c0}
  .empty-state{color:var(--muted);text-align:center;margin-top:80px;font-size:14px;line-height:1.7}

  /* ===== RIGHT: ARTIFACTS ===== */
  .art{background:var(--panel2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:.15s}
  .art:hover{border-color:var(--accent);background:var(--panel3)}
  .art .k{font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:4px}
  .art .t{font-size:13px;color:var(--ink)}
  .art .approved-tag{font-size:9px;background:#16361f;color:#5fd08a;padding:2px 6px;border-radius:3px;margin-left:6px}

  /* ===== MODAL ===== */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(3px)}
  .modal.show{display:flex}
  .sheet{background:var(--panel);border:1px solid var(--border);border-radius:14px;max-width:820px;width:94%;max-height:86vh;overflow:auto;padding:28px 32px;
    scrollbar-width:thin;scrollbar-color:var(--border) transparent}
  .sheet::-webkit-scrollbar{width:6px}.sheet::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  .sheet h3{margin:0 0 6px;color:var(--accent);font-size:18px}
  .sheet .meta{font-size:12px;color:var(--muted);margin-bottom:16px}
  .sheet .body{white-space:pre-wrap;line-height:1.7;font-size:14px;color:#d7dbe4;font-family:var(--font-serif);
    padding:16px;background:var(--panel3);border-radius:var(--radius);max-height:60vh;overflow-y:auto}
  .closex{float:right;background:none;color:var(--muted);font-size:22px;padding:0;line-height:1;cursor:pointer}
  .closex:hover{color:var(--ink)}
</style>
</head>
<body>
<header>
  <h1>Behna Archive <span>Virtual Lab</span></h1>
  <div class="hstats" id="corpusStat"></div>
</header>
<div class="app">
  <!-- LEFT PANEL -->
  <div class="col col-left">
    <div class="tabs" id="leftTabs">
      <div class="tab active" data-tab="launch">Launch</div>
      <div class="tab" data-tab="runs">Runs</div>
    </div>

    <!-- LAUNCH TAB -->
    <div id="tab-launch">
      <label>Research Topic</label>
      <textarea id="topic" class="short" placeholder="e.g. Cinema financing and mercantile credit in interwar Alexandria"></textarea>

      <label>Candidate Persona</label>
      <textarea id="p_candidate" class="tall"></textarea>

      <label>Advisor Persona</label>
      <textarea id="p_advisor" class="tall"></textarea>

      <label>Peer Template <span style="font-weight:400;text-transform:none;letter-spacing:0">(use {lens} placeholder)</span></label>
      <textarea id="p_peer" class="short"></textarea>

      <label>Peer Lenses</label>
      <div id="lensContainer"></div>
      <span class="add-lens" onclick="addLens()">+ Add lens</span>

      <div class="form-row">
        <div><label>Chapters</label><input type="number" id="nChapters" min="1" max="20" value="3"/></div>
      </div>

      <button class="btn-launch" id="launchBtn" onclick="createRun()">Launch Simulation</button>
    </div>

    <!-- RUNS TAB -->
    <div id="tab-runs" style="display:none">
      <div id="runlist"></div>
    </div>
  </div>

  <!-- CENTER: TIMELINE -->
  <div class="col-center">
    <div class="center-head">
      <div class="phases" id="phaseRow"></div>
    </div>
    <div class="controls" id="controls" style="display:none">
      <button class="b-run" onclick="ctrl('run')">Resume</button>
      <button class="b-pause" onclick="ctrl('pause')">Pause</button>
      <button class="b-stop" onclick="ctrl('stop')">Stop</button>
    </div>
    <div id="timeline" style="flex:1;overflow-y:auto;padding:16px 24px">
      <div class="empty-state">Select a run or launch a new simulation<br/>to watch the academic lifecycle unfold.</div>
    </div>
  </div>

  <!-- RIGHT: ARTIFACTS -->
  <div class="col col-right">
    <div class="stitle">Artifacts</div>
    <div id="artifacts"><div class="empty-state" style="margin-top:40px">No artifacts yet.</div></div>
  </div>
</div>

<div class="modal" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="sheet">
    <button class="closex" onclick="closeModal()">&times;</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
const PHASES=[["phase1_pitch","Pitch"],["phase2_proposal","Proposal"],["phase3_archive","Archive"],
              ["phase4_drafting","Drafting"],["phase5_colloquium","Colloquium"],["phase6_thesis","Thesis"]];
let activeRun=null, lastEventId=0, poll=null;

// --- Tabs ---
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  document.getElementById('tab-launch').style.display=t.dataset.tab==='launch'?'':'none';
  document.getElementById('tab-runs').style.display=t.dataset.tab==='runs'?'':'none';
}));

// --- Load defaults ---
async function loadDefaults(){
  const d=await jget('/api/personas/defaults');
  document.getElementById('p_candidate').value=d.candidate;
  document.getElementById('p_advisor').value=d.advisor;
  document.getElementById('p_peer').value=d.peer_template;
  document.getElementById('nChapters').value=d.n_chapters;
  const c=document.getElementById('lensContainer'); c.innerHTML='';
  d.peer_lenses.forEach(l=>addLensUI(l));
}
function addLensUI(text){
  const c=document.getElementById('lensContainer');
  const d=document.createElement('div');d.className='peer-lens';
  d.innerHTML=`<textarea class="short">${escapeHtml(text||'')}</textarea><button class="rm" onclick="this.parentElement.remove()">&times;</button>`;
  c.appendChild(d);
}
function addLens(){addLensUI('');}
function getLenses(){return [...document.querySelectorAll('#lensContainer textarea')].map(t=>t.value.trim()).filter(Boolean);}

// --- API helpers ---
async function jget(u){return (await fetch(u)).json();}
async function jpost(u,b){return (await fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})})).json();}

// --- Corpus ---
async function refreshCorpus(){
  const s=await jget('/api/corpus_stats');
  document.getElementById('corpusStat').textContent=`${s.embedded} / ${s.documents} documents embedded`;
}

// --- Runs ---
async function refreshRuns(){
  const runs=await jget('/api/runs');
  const el=document.getElementById('runlist');
  if(!runs.length){el.innerHTML='<div class="empty-state">No runs yet.</div>';return;}
  el.innerHTML=runs.map(r=>`
    <div class="runcard ${r.id===activeRun?'active':''}" onclick="openRun(${r.id})">
      <div class="topic">${escapeHtml(r.topic)}</div>
      <span class="badge ${r.status}">${r.status}</span>
    </div>`).join('');
}

async function createRun(){
  const topic=document.getElementById('topic').value.trim();
  if(!topic){document.getElementById('topic').focus();return;}
  const body={
    topic,
    candidate:document.getElementById('p_candidate').value,
    advisor:document.getElementById('p_advisor').value,
    peer_template:document.getElementById('p_peer').value,
    peer_lenses:getLenses(),
    n_chapters:parseInt(document.getElementById('nChapters').value)||3,
  };
  document.getElementById('launchBtn').disabled=true;
  const r=await jpost('/api/runs',body);
  document.getElementById('launchBtn').disabled=false;
  // Switch to runs tab
  document.querySelectorAll('.tab')[1].click();
  await refreshRuns(); openRun(r.id);
}

async function ctrl(action){if(activeRun){await jpost(`/api/runs/${activeRun}/control`,{action});}}

function openRun(id){
  activeRun=id; lastEventId=0;
  document.getElementById('timeline').innerHTML='';
  document.getElementById('controls').style.display='flex';
  refreshRuns();
  if(poll)clearInterval(poll);
  tick(); poll=setInterval(tick,2500);
}

async function tick(){
  if(!activeRun)return;
  const d=await jget(`/api/runs/${activeRun}/events?after=${lastEventId}`);
  renderPhases(d.run);
  const tl=document.getElementById('timeline');
  if(d.events.length){
    if(lastEventId===0)tl.innerHTML='';
    d.events.forEach(e=>{ tl.insertAdjacentHTML('beforeend', eventHtml(e)); lastEventId=e.id; });
    tl.scrollTop=tl.scrollHeight;
  }
  refreshArtifacts();
}

function renderPhases(run){
  if(!run)return;
  const curIdx=PHASES.findIndex(p=>p[0]===run.phase);
  let html=PHASES.map((p,i)=>{
    let c='pchip'; if(run.phase==='completed'||i<curIdx)c+=' done'; if(i===curIdx)c+=' cur';
    return `<span class="${c}">${p[1]}</span>`;
  }).join('');
  if(run.status==='running') html+=' <span class="live-dot">&#9679; live</span>';
  document.getElementById('phaseRow').innerHTML=html;
}

function eventHtml(e){
  const meta=e.meta||{};
  let gate='';
  if(e.kind==='gate') gate=meta.approved?'<span class="gate ok">Approved</span>':'<span class="gate no">Rejected</span>';
  let docs='';
  if(meta.doc_ids&&meta.doc_ids.length)
    docs='<div class="docids">'+meta.doc_ids.slice(0,10).map(f=>`<a onclick="openDoc('${escapeAttr(f)}')">${escapeHtml(f)}</a>`).join('')+'</div>';
  const t=e.ts?new Date(e.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
  return `<div class="event ${e.agent}" data-kind="${e.kind}">
    <div class="ehead"><span class="who ${e.agent}">${e.agent}${gate}</span><span class="etime">${t}</span></div>
    <div class="etitle">${escapeHtml(e.title||'')}</div>
    ${e.content?`<div class="ebody">${escapeHtml(e.content)}</div>`:''}${docs}</div>`;
}

// --- Artifacts ---
async function refreshArtifacts(){
  if(!activeRun)return;
  const arts=await jget(`/api/runs/${activeRun}/artifacts`);
  const el=document.getElementById('artifacts');
  if(!arts.length){el.innerHTML='<div class="empty-state" style="margin-top:40px">No artifacts yet.</div>';return;}
  el.innerHTML=arts.map(a=>`<div class="art" onclick='openArtifact(${a.id})'>
     <div class="k">${escapeHtml(a.kind)}${a.approved?'<span class="approved-tag">approved</span>':''}</div>
     <div class="t">${escapeHtml(a.title)}</div></div>`).join('');
  window._arts={}; arts.forEach(a=>window._arts[a.id]=a);
}
function openArtifact(id){
  const a=window._arts[id];if(!a)return;
  document.getElementById('modalContent').innerHTML=`<h3>${escapeHtml(a.title)}</h3>
    <div class="meta">${a.kind} &middot; v${a.version} &middot; ${a.approved?'approved':'draft'}</div>
    <div class="body">${escapeHtml(a.content||'')}</div>`;
  document.getElementById('modal').classList.add('show');
}
async function openDoc(fn){
  const d=await jget('/api/doc/'+encodeURIComponent(fn));
  if(!d||!d.filename){return;}
  document.getElementById('modalContent').innerHTML=`<h3>${escapeHtml(d.filename)}</h3>
    <div class="meta">${escapeHtml(d.doc_type||'')} &middot; ${escapeHtml(d.creation_date||'n.d.')} &middot; ${escapeHtml(d.sender||'')} &rarr; ${escapeHtml(d.recipient||'')} &middot; ${escapeHtml(d.origin||'')} &middot; ${escapeHtml(d.languages||'')}</div>
    <div class="body"><strong>Summary</strong>\n${escapeHtml(d.summary||'—')}\n\n<strong>Transcription</strong>\n${escapeHtml(d.transcription||'—')}\n\n<strong>English Translation</strong>\n${escapeHtml(d.translation||'—')}</div>`;
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show');}
function escapeHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escapeAttr(s){return(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');}

// --- Init ---
loadDefaults();refreshCorpus();refreshRuns();
setInterval(refreshCorpus,10000);setInterval(refreshRuns,5000);
</script>
</body>
</html>
