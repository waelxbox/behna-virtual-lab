<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Artifact Reader — Behna Virtual Lab</title>
<style>
:root{
  --ink:#081012;--ink-1:#0d1719;--ink-2:#122023;
  --line:rgba(222,212,183,.13);--line-strong:rgba(222,212,183,.23);
  --paper:#f1ead9;--paper-2:#d8cdb4;--muted:#8f9b98;
  --gold:#d9ae61;--gold-soft:#f1d99f;--lapis:#6aa9ff;--teal:#62d5bf;--coral:#ed8f7d;--violet:#af9df4;
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  --sans:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{color-scheme:dark;scroll-behavior:smooth}
body{min-height:100vh;background:radial-gradient(circle at 78% 4%,rgba(79,129,125,.08),transparent 28rem),linear-gradient(135deg,#071012,#0b1315 54%,#081012);color:var(--paper);font:16px/1.8 var(--serif)}

/* Top bar */
.topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:14px;padding:14px 30px;border-bottom:1px solid var(--line);background:rgba(8,16,18,.88);backdrop-filter:blur(18px)}
.back{display:flex;align-items:center;gap:6px;padding:7px 12px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.025);color:#aab5b2;font:12px var(--sans);text-decoration:none;cursor:pointer;transition:.16s}
.back:hover{border-color:var(--line-strong);color:var(--paper);background:rgba(255,255,255,.05)}
.back svg{width:14px;height:14px}
.topbar-title{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--paper-2);font:500 15px/1 var(--serif)}
.topbar-meta{color:var(--muted);font:11px var(--sans)}
.dl-btn{padding:8px 14px;border:1px solid rgba(106,169,255,.3);border-radius:8px;background:rgba(106,169,255,.06);color:var(--lapis);font:600 11px/1 var(--sans);text-decoration:none;transition:.16s}
.dl-btn:hover{background:rgba(106,169,255,.12);border-color:rgba(106,169,255,.5)}

/* Tabs */
.tab-bar{display:flex;gap:4px;padding:12px 30px 0;border-bottom:1px solid var(--line);background:rgba(8,16,18,.6);overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab{padding:10px 16px;border:1px solid transparent;border-bottom:none;border-radius:8px 8px 0 0;background:transparent;color:var(--muted);font:11px/1 var(--sans);font-weight:600;cursor:pointer;white-space:nowrap;transition:.16s}
.tab:hover{color:var(--paper);background:rgba(255,255,255,.03)}
.tab.active{color:var(--gold-soft);border-color:var(--line);background:rgba(217,174,97,.06)}

/* Layout: ToC | Main | Margin */
.reader-shell{display:grid;grid-template-columns:200px minmax(0,680px) 240px;gap:0;max-width:1200px;margin:0 auto;padding:40px 24px 80px}

/* Sticky ToC */
.toc{position:sticky;top:80px;align-self:start;max-height:calc(100vh - 100px);overflow-y:auto;padding-right:18px;scrollbar-width:thin;scrollbar-color:var(--line) transparent}
.toc::-webkit-scrollbar{width:4px}.toc::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}
.toc-title{color:#63716f;font:800 9px/1 var(--sans);letter-spacing:.19em;text-transform:uppercase;margin-bottom:14px}
.toc a{display:block;padding:6px 0 6px 12px;border-left:2px solid transparent;color:#6f7c79;font:12px/1.4 var(--sans);text-decoration:none;transition:.14s}
.toc a:hover{color:var(--paper-2)}
.toc a.active{color:var(--gold);border-left-color:var(--gold)}
.toc a.h3{padding-left:22px;font-size:11px}

/* Main content */
.main-col{min-width:0}
.artifact-header{margin-bottom:36px}
.kicker{color:var(--gold);font:800 10px/1 var(--sans);letter-spacing:.15em;text-transform:uppercase;margin-bottom:12px}
.artifact-header h1{font:500 clamp(24px,3vw,34px)/1.2 var(--serif);letter-spacing:-.01em;margin-bottom:8px}
.artifact-header .meta{color:var(--muted);font:12px/1.4 var(--sans)}

/* Prose */
.prose{font:16px/1.8 var(--serif);color:var(--paper)}
.prose h2{font:600 22px/1.3 var(--serif);color:var(--paper);margin:2.4em 0 .7em;padding-top:.6em;border-top:1px solid var(--line);scroll-margin-top:90px}
.prose h3{font:600 17px/1.3 var(--serif);color:var(--paper-2);margin:1.8em 0 .5em;scroll-margin-top:90px}
.prose p{margin-bottom:1.5em;color:#d4cfc3}
.prose strong{color:var(--paper);font-weight:600}
.prose blockquote{margin:1.5em 0;padding:14px 18px;border-left:3px solid var(--gold);background:rgba(217,174,97,.04);border-radius:0 8px 8px 0;color:#c9c2b2;font-style:italic}
.prose ul,.prose ol{margin:1em 0 1.5em 1.2em;color:#c4bfb3}
.prose li{margin-bottom:.5em}

/* Margin notes */
.margin-col{position:sticky;top:80px;align-self:start;max-height:calc(100vh - 100px);overflow-y:auto;padding-left:24px;border-left:1px solid var(--line);scrollbar-width:thin;scrollbar-color:var(--line) transparent}
.margin-col::-webkit-scrollbar{width:4px}.margin-col::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}
.margin-note{margin-bottom:18px;padding:10px 12px;border:1px solid rgba(217,174,97,.12);border-radius:8px;background:rgba(217,174,97,.03);font:11px/1.5 var(--sans);color:#a09882}
.margin-note .mn-label{color:var(--gold);font-size:8px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.margin-note .mn-doc{color:var(--teal);cursor:pointer;text-decoration:underline;text-decoration-color:rgba(98,213,191,.3)}
.margin-note .mn-doc:hover{color:#8eebd4}
.margin-note .mn-agent{color:var(--coral);font-weight:600}

/* Accordions */
.accordion{margin:1.5em 0;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.accordion-head{display:flex;align-items:center;gap:10px;padding:13px 16px;background:rgba(255,255,255,.02);cursor:pointer;font:600 12px/1 var(--sans);color:#9ba6a3;transition:.16s}
.accordion-head:hover{background:rgba(255,255,255,.04);color:var(--paper)}
.accordion-head svg{width:12px;height:12px;transition:transform .2s;flex-shrink:0}
.accordion-head.open svg{transform:rotate(90deg)}
.accordion-body{display:none;padding:16px;border-top:1px solid var(--line);font:13px/1.7 var(--serif);color:#a3aeab}
.accordion-body.open{display:block}

/* Tab content panels */
.tab-panel{display:none}
.tab-panel.active{display:block}

/* Loading */
.loading{text-align:center;padding:80px 20px;color:var(--muted);font:14px var(--sans)}

/* Responsive */
@media(max-width:1000px){.reader-shell{grid-template-columns:1fr;max-width:720px}.toc{display:none}.margin-col{position:static;border-left:0;padding:20px 0 0;border-top:1px solid var(--line);margin-top:30px}}
@media(max-width:600px){.topbar{padding:12px 16px}.reader-shell{padding:24px 16px 60px}.tab-bar{padding:10px 16px 0}}
</style>
</head>
<body>
<header class="topbar">
  <a class="back" onclick="window.close();return false;" href="/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Observatory</a>
  <span class="topbar-title" id="topTitle">Loading…</span>
  <span class="topbar-meta" id="topMeta"></span>
  <a class="dl-btn" id="dlLink" href="#">Download .md</a>
</header>

<nav class="tab-bar" id="tabBar"></nav>

<div class="reader-shell">
  <aside class="toc" id="tocPanel">
    <div class="toc-title">Contents</div>
    <nav id="tocNav"></nav>
  </aside>
  <article class="main-col" id="mainCol">
    <div class="loading">Loading artifact…</div>
  </article>
  <aside class="margin-col" id="marginCol"></aside>
</div>

<script>
// Parse run_id and artifact_id from URL: /reader/{rid}/{aid}
const parts=window.location.pathname.split('/');
const RID=parseInt(parts[2]);
const AID=parseInt(parts[3]);

async function init(){
  // Fetch all artifacts for this run (for tabs)
  const arts=await(await fetch(`/api/runs/${RID}/artifacts`)).json();
  const current=arts.find(a=>a.id===AID);
  if(!current){document.getElementById('mainCol').innerHTML='<div class="loading">Artifact not found.</div>';return}

  // Top bar
  document.getElementById('topTitle').textContent=current.title;
  document.getElementById('topMeta').textContent=`${current.kind} · v${current.version} · ${current.approved?'Approved':'Draft'}`;
  document.getElementById('dlLink').href=`/api/runs/${RID}/artifacts/${AID}/download`;

  // Tabs (all artifacts in this run)
  const tabBar=document.getElementById('tabBar');
  arts.forEach(a=>{
    const t=document.createElement('button');
    t.className='tab'+(a.id===AID?' active':'');
    t.textContent=a.title.length>28?a.title.substring(0,26)+'…':a.title;
    t.title=a.title;
    t.onclick=()=>{window.location.href=`/reader/${RID}/${a.id}`};
    tabBar.appendChild(t);
  });

  // Render content
  renderArtifact(current);
}

function renderArtifact(art){
  const mainCol=document.getElementById('mainCol');
  const marginCol=document.getElementById('marginCol');
  const tocNav=document.getElementById('tocNav');

  // Parse content into structured HTML
  const raw=art.content||'';
  const {html,margins,headings}=parseContent(raw);

  // Header
  mainCol.innerHTML=`<div class="artifact-header">
    <div class="kicker">${esc(art.kind)} · Run #${RID}</div>
    <h1>${esc(art.title)}</h1>
    <div class="meta">Version ${art.version} · ${art.approved?'Approved':'Draft'} · ${new Date(art.created_at).toLocaleDateString('en-US',{day:'numeric',month:'long',year:'numeric'})}</div>
  </div><div class="prose" id="proseBody">${html}</div>`;

  // Margin notes
  marginCol.innerHTML=margins.map(m=>`<div class="margin-note" data-section="${m.section}">
    <div class="mn-label">${m.type==='citation'?'Source':'Agent note'}</div>
    ${m.type==='citation'?`<span class="mn-doc" onclick="openDocModal('${esc(m.ref)}')">${esc(m.ref)}</span>`:`<span class="mn-agent">${esc(m.agent||'')}</span>`}
    <div style="margin-top:4px">${esc(m.text)}</div>
  </div>`).join('');

  // ToC
  tocNav.innerHTML=headings.map(h=>`<a href="#${h.id}" class="${h.level}">${esc(h.text)}</a>`).join('');

  // Scroll spy
  setupScrollSpy(headings);

  // Accordions
  document.querySelectorAll('.accordion-head').forEach(el=>{
    el.addEventListener('click',()=>{
      el.classList.toggle('open');
      el.nextElementSibling.classList.toggle('open');
    });
  });
}

function parseContent(raw){
  const lines=raw.split('\n');
  let html='';
  let margins=[];
  let headings=[];
  let sectionId='intro';
  let inList=false;
  let marginIdx=0;
  let isColloquiumSection=false;
  let accordionOpen=false;

  for(let i=0;i<lines.length;i++){
    const line=lines[i];
    const trimmed=line.trim();

    // Detect headings
    const h2Match=trimmed.match(/^##\s+(.+)/)||trimmed.match(/^([A-Z][A-Z\s\-:]{8,})$/);
    const h3Match=trimmed.match(/^###\s+(.+)/);
    const boldHeaderMatch=!h2Match&&!h3Match&&trimmed.match(/^\*\*(.{10,})\*\*$/);

    // Check for section-like patterns (all caps, or lines ending with colon that look like headers)
    const implicitH2=!h2Match&&!h3Match&&!boldHeaderMatch&&trimmed.match(/^[A-Z][A-Za-z\s,\-:]+:$/);

    if(h2Match){
      if(accordionOpen){html+='</div></div>';accordionOpen=false}
      if(inList){html+='</ul>';inList=false}
      const text=h2Match[1].replace(/^#+\s*/,'').replace(/\*\*/g,'');
      sectionId='s'+headings.length;
      headings.push({id:sectionId,text,level:'h2'});
      isColloquiumSection=/colloquium|peer|critique|objection|feedback/i.test(text);
      if(isColloquiumSection){
        html+=`<h2 id="${sectionId}">${esc(text)}</h2>`;
        html+=`<div class="accordion"><div class="accordion-head"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg> Expand peer review / colloquium notes</div><div class="accordion-body">`;
        accordionOpen=true;
      } else {
        html+=`<h2 id="${sectionId}">${esc(text)}</h2>`;
      }
      continue;
    }
    if(h3Match){
      if(inList){html+='</ul>';inList=false}
      const text=h3Match[1].replace(/\*\*/g,'');
      sectionId='s'+headings.length;
      headings.push({id:sectionId,text,level:'h3'});
      html+=`<h3 id="${sectionId}">${esc(text)}</h3>`;
      continue;
    }
    if(boldHeaderMatch){
      if(inList){html+='</ul>';inList=false}
      const text=boldHeaderMatch[1];
      sectionId='s'+headings.length;
      headings.push({id:sectionId,text,level:'h3'});
      html+=`<h3 id="${sectionId}">${esc(text)}</h3>`;
      continue;
    }
    if(implicitH2){
      if(inList){html+='</ul>';inList=false}
      const text=implicitH2[0].replace(/:$/,'');
      sectionId='s'+headings.length;
      headings.push({id:sectionId,text,level:'h2'});
      html+=`<h2 id="${sectionId}">${esc(text)}</h2>`;
      continue;
    }

    // Extract inline citations (Doc IDs like Behna_VolXX_YYYY_ZZZ.jpg)
    const docPattern=/\b(Behna_Vol\d+_\d{4}_\d{3}\.jpg)\b/g;
    let match;
    while((match=docPattern.exec(trimmed))!==null){
      margins.push({type:'citation',ref:match[1],text:'Archival source cited in this section',section:sectionId});
    }

    // Detect agent reasoning markers
    const agentMatch=trimmed.match(/^\[(Advisor|Candidate|Peer|Postcolonial|Marxist|Quantitative)[^\]]*\]:\s*(.+)/i);
    if(agentMatch){
      margins.push({type:'agent',agent:agentMatch[1],text:agentMatch[2].substring(0,120),section:sectionId});
    }

    // Lists
    if(trimmed.match(/^[-•*]\s+/)){
      if(!inList){html+='<ul>';inList=true}
      html+=`<li>${formatInline(trimmed.replace(/^[-•*]\s+/,''))}</li>`;
      continue;
    }
    if(trimmed.match(/^\d+\.\s+/)){
      if(!inList){html+='<ul>';inList=true}
      html+=`<li>${formatInline(trimmed.replace(/^\d+\.\s+/,''))}</li>`;
      continue;
    }
    if(inList&&trimmed===''){html+='</ul>';inList=false;continue}

    // Blockquotes
    if(trimmed.startsWith('>')){
      html+=`<blockquote>${formatInline(trimmed.replace(/^>\s*/,''))}</blockquote>`;
      continue;
    }

    // Empty line
    if(trimmed==='')continue;

    // Normal paragraph
    html+=`<p>${formatInline(trimmed)}</p>`;
  }
  if(inList)html+='</ul>';
  if(accordionOpen)html+='</div></div>';

  return {html,margins,headings};
}

function formatInline(text){
  // Bold
  text=text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  // Italic
  text=text.replace(/\*(.+?)\*/g,'<em>$1</em>');
  // Doc ID links
  text=text.replace(/\b(Behna_Vol\d+_\d{4}_\d{3}\.jpg)\b/g,'<span class="mn-doc" onclick="openDocModal(\'$1\')" style="color:var(--teal);cursor:pointer;text-decoration:underline;text-decoration-color:rgba(98,213,191,.3)">$1</span>');
  return text;
}

function setupScrollSpy(headings){
  if(!headings.length)return;
  const tocLinks=document.querySelectorAll('#tocNav a');
  const observer=new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        tocLinks.forEach(l=>l.classList.remove('active'));
        const active=document.querySelector(`#tocNav a[href="#${entry.target.id}"]`);
        if(active)active.classList.add('active');
      }
    });
  },{rootMargin:'-80px 0px -70% 0px',threshold:0});
  headings.forEach(h=>{
    const el=document.getElementById(h.id);
    if(el)observer.observe(el);
  });
}

// Document metadata modal (inline)
async function openDocModal(fn){
  const d=await(await fetch('/api/doc/'+encodeURIComponent(fn))).json();
  if(!d||!d.filename)return;
  const modal=document.createElement('div');
  modal.style.cssText='position:fixed;inset:0;z-index:20;display:grid;place-items:center;padding:24px;background:rgba(3,7,8,.72);backdrop-filter:blur(12px)';
  modal.innerHTML=`<div style="width:min(700px,95%);max-height:85vh;overflow:auto;border:1px solid rgba(222,212,183,.23);border-radius:16px;background:#101a1c;box-shadow:0 40px 100px rgba(0,0,0,.55);padding:24px;scrollbar-width:thin;scrollbar-color:rgba(222,212,183,.13) transparent">
    <div style="display:flex;align-items:center;margin-bottom:16px"><h2 style="margin:0;font:18px var(--serif);flex:1">${esc(d.filename)}</h2><button onclick="this.closest('div[style*=fixed]').remove()" style="border:0;background:none;color:#7c8986;font-size:22px;cursor:pointer">&times;</button></div>
    <div style="color:var(--gold);font-size:9px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;margin-bottom:10px">Behna Family Collection · AUC Rare Books and Special Collections Library</div>
    <p style="color:#687572;font-size:11px;margin-bottom:18px">${esc(d.doc_type||'')} · ${esc(d.creation_date||'n.d.')} · ${esc(d.sender||'')} → ${esc(d.recipient||'')} · ${esc(d.origin||'')} · ${esc(d.languages||'')}</p>
    <div style="padding:20px;border:1px solid rgba(217,174,97,.14);border-radius:10px;background:#e8dfca;color:#29251e;font:14px/1.7 var(--serif);max-height:50vh;overflow-y:auto;white-space:pre-wrap"><strong>Summary</strong>\n${esc(d.summary||'—')}\n\n<strong>Transcription</strong>\n${esc(d.transcription||'—')}\n\n<strong>English Translation</strong>\n${esc(d.translation||'—')}</div>
  </div>`;
  modal.addEventListener('click',e=>{if(e.target===modal)modal.remove()});
  document.addEventListener('keydown',function handler(e){if(e.key==='Escape'){modal.remove();document.removeEventListener('keydown',handler)}});
  document.body.appendChild(modal);
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

init();
</script>
</body>
</html>
